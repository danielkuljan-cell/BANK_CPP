<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Bank C++ & HTML</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Mój Bank (C++ Backend)</h1>
        <div class="balance-box">
            <h2>Stan konta: <span id="balance">0.00</span> PLN</h2>
        </div>
        
        <div class="actions">
            <input type="number" id="amount" placeholder="Podaj kwotę" min="1">
            <button onclick="deposit()">Wpłać</button>
            <button onclick="withdraw()">Wypłać</button>
        </div>
        <p id="message"></p>
    </div>
<section>DARMOWE CP</section>
    <script>
        async function fetchBalance() {
            let response = await fetch('/api/balance');
            let data = await response.text();
            document.getElementById('balance').innerText = data;
        }

        async function deposit() {
            let amount = document.getElementById('amount').value;
            let response = await fetch(`/api/deposit?amount=${amount}`, { method: 'POST' });
            document.getElementById('message').innerText = await response.text();
            fetchBalance();
        }

        async function withdraw() {
            let amount = document.getElementById('amount').value;
            let response = await fetch(`/api/withdraw?amount=${amount}`, { method: 'POST' });
            document.getElementById('message').innerText = await response.text();
            fetchBalance();
        }

        // Pobierz stan konta przy starcie
        fetchBalance();

    </script>
</body>
</html>
